<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ────────────────────────────────────────────── -->
    <title>SRZ Tourism — Discover the World's Hidden Gems</title>
    <meta name="description" content="SRZ Tourism is a boutique travel agency and blog platform curating authentic destinations, cultural insights, and expert travel guides across 120+ countries." />
    <meta name="keywords" content="travel blog, tourism, destinations, travel tips, adventure travel, cultural experiences, SRZ Tourism" />
    <meta name="author" content="SRZ Tourism" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://srztourism.com/" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ──────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SRZ Tourism" />
    <meta property="og:title" content="SRZ Tourism — Discover the World's Hidden Gems" />
    <meta property="og:description" content="Boutique travel experiences, curated destinations, and expert guides for the modern explorer. Join our community of adventurers." />
    <meta property="og:image" content="https://picsum.photos/seed/srztourism-og/1200/630" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="SRZ Tourism — beautiful travel destinations" />
    <meta property="og:url" content="https://srztourism.com/" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter / X Card ───────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SRZTourism" />
    <meta name="twitter:creator" content="@SRZTourism" />
    <meta name="twitter:title" content="SRZ Tourism — Discover the World's Hidden Gems" />
    <meta name="twitter:description" content="Boutique travel experiences, curated destinations, and expert guides for the modern explorer." />
    <meta name="twitter:image" content="https://picsum.photos/seed/srztourism-og/1200/630" />
    <meta name="twitter:image:alt" content="SRZ Tourism travel destinations" />

    <!-- ── Structured Data: Organisation ─────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "SRZ Tourism",
      "description": "Boutique travel agency and storytelling platform dedicated to uncovering the world's most authentic experiences.",
      "url": "https://srztourism.com",
      "logo": "https://srztourism.com/favicon.svg",
      "sameAs": [
        "https://instagram.com/srztourism",
        "https://twitter.com/srztourism",
        "https://facebook.com/srztourism"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": "English"
      }
    }
    </script>

    <!-- ── Structured Data: Website + SearchAction ───────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SRZ Tourism",
      "url": "https://srztourism.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://srztourism.com/?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ── Structured Data: Blog ──────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Blog",
      "name": "SRZ Tourism Blog",
      "description": "Travel stories, destination guides, and cultural insights from around the world.",
      "url": "https://srztourism.com",
      "publisher": {
        "@type": "Organization",
        "name": "SRZ Tourism",
        "logo": {
          "@type": "ImageObject",
          "url": "https://srztourism.com/favicon.svg"
        }
      }
    }
    </script>

    <!-- ── Favicons ───────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="msapplication-TileColor" content="#1a1a1a" />

    <!-- ── Performance ───────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://picsum.photos" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
